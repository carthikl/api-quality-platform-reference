name: PR Quality Gate

on:
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  API_BASE_URL: 'https://jsonplaceholder.typicode.com'

jobs:
  rest-assured:
    name: REST Assured — Functional Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Run REST Assured tests
        run: mvn verify -pl rest-assured -Dapi.base.url=${{ env.API_BASE_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rest-assured-results
          path: rest-assured/target/surefire-reports/

  karate:
    name: Karate — BDD API Scenarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Run Karate scenarios
        run: mvn verify -pl karate -Dapi.base.url=${{ env.API_BASE_URL }} -Dkarate.env=ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: karate-results
          path: karate/target/karate-reports/

  pact-consumer:
    name: Pact — Consumer Contract Generation
    runs-on: ubuntu-latest
    outputs:
      pact-version: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - id: meta
        run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Generate pact artifacts (consumer tests)
        run: mvn verify -pl pact -Dapi.base.url=${{ env.API_BASE_URL }} -Dtest='**/*ConsumerTest'
      - name: Publish pacts to broker
        if: ${{ secrets.PACT_BROKER_URL != '' }}
        run: |
          mvn pact:publish \
            -pl pact \
            -Dpact.broker.url=${{ secrets.PACT_BROKER_URL }} \
            -Dpact.broker.token=${{ secrets.PACT_BROKER_TOKEN }} \
            -Dpact.consumer.version=${{ github.sha }} \
            -Dpact.consumer.tags=${{ github.head_ref }}
      - uses: actions/upload-artifact@v4
        with:
          name: pact-artifacts
          path: pact/target/pacts/

  pact-provider:
    name: Pact — Provider Verification
    runs-on: ubuntu-latest
    needs: pact-consumer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - uses: actions/download-artifact@v4
        with:
          name: pact-artifacts
          path: pact/target/pacts/
      - name: Run provider verification
        run: mvn verify -pl pact -Dapi.base.url=${{ env.API_BASE_URL }} -Dtest='**/*ProviderTest'
