name: PR Quality Gate

# Every pull request to main or develop must pass all four jobs before merging.
# The dependency chain is deliberate: functional tests validate the codebase first,
# then contracts are generated from known-good code, then the provider verifies them.
# Generating a contract from a failing codebase is worse than no contract —
# it trains the provider to satisfy incorrect consumer behavior.

on:
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  API_BASE_URL: 'https://jsonplaceholder.typicode.com'

# dorny/test-reporter requires write access to post check annotations on the PR.
permissions:
  checks: write
  pull-requests: write

jobs:

  # ── Job 1 ────────────────────────────────────────────────────────────────
  # Functional API validation — must pass before any code merges.
  # Catches broken endpoints and schema violations immediately.
  # Runs in parallel with karate-bdd: both are independent functional gates,
  # neither depends on the other, so there is no reason to serialize them.
  # ─────────────────────────────────────────────────────────────────────────
  rest-assured-functional:
    name: REST Assured — Functional API Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run REST Assured functional tests
        run: mvn test -pl rest-assured -Dapi.base.url=${{ env.API_BASE_URL }}

      # Publishes JUnit XML results as GitHub Check annotations on the PR.
      # Engineers see which specific test methods failed without reading logs.
      - name: Publish REST Assured test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: REST Assured — Functional Validation
          path: rest-assured/target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: 'false'

  # ── Job 2 ────────────────────────────────────────────────────────────────
  # BDD scenarios readable by Product and QA.
  # Runs in parallel with REST Assured — same gate, different audience for
  # the report. Karate HTML is written for non-engineers; surefire XML is
  # written for CI tooling. Both must pass before the PR merges.
  # ─────────────────────────────────────────────────────────────────────────
  karate-bdd:
    name: Karate — BDD API Scenarios
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run Karate BDD scenarios
        run: mvn test -pl karate -Dapi.base.url=${{ env.API_BASE_URL }}

      # HTML report is the artifact Jason reads — scenario names are business language.
      - name: Upload Karate HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: karate-report
          path: karate/target/karate-reports/

  # ── Job 3 ────────────────────────────────────────────────────────────────
  # Consumer contract generation — runs after functional tests pass.
  # Publishes what this service expects from its dependencies.
  # Must complete before any deployment.
  #
  # WHY it waits for jobs 1 and 2:
  # A contract generated from a broken codebase is wrong by definition.
  # If PrescriptionService has a bug in how it calls PatientService, the
  # generated contract encodes that bug as a requirement. The provider then
  # verifies against incorrect expectations. Functional tests must pass first.
  # ─────────────────────────────────────────────────────────────────────────
  pact-consumer:
    name: Pact — Consumer Contract Generation
    runs-on: ubuntu-latest
    needs: [rest-assured-functional, karate-bdd]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Generate consumer pact contracts
        run: |
          mvn test -pl pact \
            -Dtest=PrescriptionConsumerTest \
            -DfailIfNoSpecifiedTests=false \
            -Dapi.base.url=${{ env.API_BASE_URL }}
        # -DfailIfNoSpecifiedTests=false: the pact module has two ordered Surefire
        # executions (consumer, then provider). When filtering to only the consumer
        # class, the provider execution finds no matching tests. Without this flag,
        # Surefire 3.x fails the build when a filtered execution finds nothing.

      # The pact JSON file is the contract artifact. Job 4 downloads it and
      # replays it against the real provider — no code is shared between jobs.
      - name: Upload pact contracts
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: pact/target/pacts/

  # ── Job 4 ────────────────────────────────────────────────────────────────
  # Provider verification — validates that PatientService can still satisfy
  # every consumer contract. If this fails, a provider change has broken a
  # dependency. Fix the provider — not the consumer.
  #
  # WHY it waits for pact-consumer:
  # The pact JSON file written by job 3 must exist before provider verification
  # can run. The file is passed between jobs as a GitHub Actions artifact.
  # Provider verification is a real HTTP call to the live provider API — no mock.
  # ─────────────────────────────────────────────────────────────────────────
  pact-provider:
    name: Pact — Provider Contract Verification
    runs-on: ubuntu-latest
    needs: [pact-consumer]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # Restore the pact file to the exact path @PactFolder("target/pacts") resolves to.
      # Surefire sets the working directory to the module root (pact/), so
      # target/pacts → pact/target/pacts/ relative to the repo root.
      - name: Download pact contracts from consumer job
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pact/target/pacts/

      - name: Verify provider satisfies consumer contracts
        run: |
          mvn test -pl pact \
            -Dtest=PatientProviderTest \
            -DfailIfNoSpecifiedTests=false \
            -Dapi.base.url=${{ env.API_BASE_URL }}
