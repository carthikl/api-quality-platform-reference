name: Staging Smoke Test

# Smoke test runs after every deployment to staging. @smoke tag = critical paths only.
# 5 minutes maximum. If this fails, staging is unhealthy — stop all deployments until fixed.

on:
  workflow_dispatch:

# JAVA_HOME is set correctly by actions/setup-java in each job.
# Declared here to make the Java dependency explicit at the workflow level.
env:
  JAVA_HOME: ${{ env.JAVA_HOME }}
  JAVA_VERSION: '17'
  API_BASE_URL: 'https://jsonplaceholder.typicode.com'

jobs:

  staging-smoke:
    name: Karate — Staging Smoke Scenarios
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run @smoke scenarios against staging
        run: |
          mvn test -pl karate \
            -Dkarate.options="--tags @smoke" \
            -Dapi.base.url=${{ env.API_BASE_URL }}

      # HTML report surfaces which scenario failed and what the actual response was.
      # Engineers triaging a failed smoke gate read this first — not the Maven log.
      - name: Upload Karate smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-smoke-report
          path: karate/target/karate-reports/
