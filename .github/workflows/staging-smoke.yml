name: Staging Smoke Test

# Smoke test runs after every deployment to staging. @smoke tag = critical paths only.
# 5 minutes maximum. If this fails, staging is unhealthy — stop all deployments until fixed.

on:
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  API_BASE_URL: 'https://jsonplaceholder.typicode.com'

jobs:

  staging-smoke:
    name: Karate — Staging Smoke Scenarios
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run @smoke scenarios against staging
        run: |
          mvn test -pl karate \
            -Dkarate.options="--tags @smoke" \
            -Dapi.base.url=${{ env.API_BASE_URL }}

      # HTML report surfaces which scenario failed and what the actual response was.
      # Engineers triaging a failed smoke gate read this first — not the Maven log.
      - name: Upload Karate smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-smoke-report
          path: karate/target/karate-reports/

  # ── System load test ──────────────────────────────────────────────────────
  # Runs after Karate smoke confirms the deployment is healthy.
  # Validates the full prescription checkout journey holds SLA under load.
  # This tests the deployment, not the code — code was validated on PR.
  # ─────────────────────────────────────────────────────────────────────────
  k6-system-load:
    name: k6 — System Load Test
    runs-on: ubuntu-latest
    needs: [staging-smoke]

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run system load test
        run: |
          k6 run \
            --env API_BASE_URL=${{ vars.STAGING_URL || env.API_BASE_URL }} \
            --out json=k6/reports/load-results.json \
            k6/system/prescription-checkout-load.js

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-load-results
          path: k6/reports/

  # ── E2E Journey ───────────────────────────────────────────────────────────
  # Runs the @e2e @smoke scenario — the full prescription checkout journey
  # across all three microservices — after Karate @smoke confirms the
  # deployment is healthy.
  #
  # WHY it runs here and not on every PR:
  # E2E validates the integrated staging deployment as a complete system.
  # PR tests validate individual service behavior in isolation. These are
  # different questions. Conflating them couples PR velocity to staging health.
  # ─────────────────────────────────────────────────────────────────────────
  e2e-smoke-journey:
    name: E2E — Prescription Checkout Journey (Smoke)
    runs-on: ubuntu-latest
    needs: [staging-smoke]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run E2E @smoke journey against staging
        run: |
          mvn test -pl karate \
            -Dtest=EndToEndRunner \
            -Drun.e2e=true \
            -Dkarate.options="--tags @e2e and @smoke" \
            -DfailIfNoSpecifiedTests=false \
            -Dapi.base.url=${{ vars.STAGING_URL || env.API_BASE_URL }} \
            -Dkarate.env=staging

      - name: Upload E2E journey report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-smoke-journey-report
          path: karate/target/karate-reports/
